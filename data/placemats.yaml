prophets:

  # ── The Reverend ────────────────────────────────────────────────
  - id: reverend
    name: The Reverend
    epithet: '"The congregation will drink as one."'
    build_path: S / V Build Path
    accent_color: "#c8601a"
    portrait_image: "images/Prophet Reverand.png"
    abilities:
      - tag: "Primary — Prophet Phase, once per turn"
        text: "Pay <strong>1S + 1D</strong> → add <strong>1V</strong> to your pool."
        style: ""
      - tag: "⚠ Passive Penalty — checked each End Phase"
        text: "If you hold <strong>0V</strong> at the start of your turn, pay <strong>2$</strong> or lose <strong>1S</strong>."
        style: penalty
      - tag: "☩ Resurrection — Fallen Prophet only"
        text: "Spend all remaining $ (min 3$). Gain +1V per $ spent. Return with <strong>3S, 2D</strong>."
        style: resurrection
    win_conditions:
      - badge: Win 1
        text: "Loved — Seekers in pool"
        target: 50S
        progress: [12, 25, 37, 50]
      - badge: Win 2
        text: "Carnage — Victims accumulated"
        target: 50V
        progress: [12, 25, 37, 50]
    slots:
      doctrine:
        - {num: D1, locked: false}
        - {num: D2, locked: false}
        - {num: D3, locked: true}
      apostle:
        - {num: A1, locked: false}
        - {num: A2, locked: false}
        - {num: A3, locked: false}
      artifact:
        - {num: R1, locked: false}
        - {num: R2, locked: false}
        - {num: R3, locked: true}
    turn_phases:
      - {name: Upkeep,  note: "+2S +1D<br>Draw 2"}
      - {name: Prophet, note: "Use ability<br>free"}
      - {name: Main,    note: "Play up to<br>3 cards"}
      - {name: End,     note: "Win/loss<br>checks"}
      - {name: Cleanup, note: "Discard<br>pass"}
    fallen_text: >-
      0S + 0D at End Phase → lose all Apostles &amp; Artifacts.
      Pay resurrection cost on Main Phase to return.

