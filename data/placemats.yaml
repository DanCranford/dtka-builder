      - tag: "⚠ Passive Penalty — checked each End Phase"
        text: "If your Seeker count dropped this turn, pay <strong>2D</strong> or lose <strong>1 additional S</strong>. Attrition is unacceptable."
        style: penalty
      - tag: "☩ Resurrection — Fallen Prophet only"
        text: "Pay <strong>4$</strong> and discard <strong>1 card</strong> from hand. Return with <strong>3S, 4D</strong> and draw <strong>2 cards</strong> immediately. The Brand pivots."
        style: resurrection
    win_conditions:
